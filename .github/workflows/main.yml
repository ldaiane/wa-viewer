name: Gerar APK Final
on:
  push:
    branches: [ main ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Instalar Dependências e Forçar Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          # Força a inicialização mesmo se já existir
          npx cap init WhatsView com.whatsview.app --web-dir . --force
          npx cap add android || true 

      - name: Gerar Ícones
        run: |
          mkdir -p resources
          cp icon.png resources/icon-only.png || true
          cp icon.png resources/icon-foreground.png || true
          cp icon.png resources/icon-background.png || true
          npx capacitor-assets generate --android || echo "Ícone não encontrado, pulando..."

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sincronizar e Build do APK
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Disponibilizar APK para Download
        uses: actions/upload-artifact@v4
        with:
          name: WhatsView-APK-Pronto
          path: android/app/build/outputs/apk/debug/app-debug.apk
