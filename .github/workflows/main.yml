name: Build e Release WhatsView

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  android-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Cache Node Modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: node-modules-${{ hashFiles('package-lock.json') }}

      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Preparar Pastas e Instalar Capacitor
        run: |
          mkdir -p www
          cp index.html www/
          cp manifest.json www/ || true
          cp sw.js www/ || true
          cp ícone.png www/ || true

          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

          npx cap init WhatsView com.whatsview.app --web-dir www
          npx cap add android || echo "Android já existe"

      - name: Ativar Compartilhamento de ZIP (WhatsApp)
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i '/<\/activity>/i \
            <intent-filter>\n\
                <action android:name="android.intent.action.SEND"/>\n\
                <category android:name="android.intent.category.DEFAULT"/>\n\
                <data android:mimeType="application/zip"/>\n\
            </intent-filter>\n\
            <intent-filter>\n\
                <action android:name="android.intent.action.SEND_MULTIPLE"/>\n\
                <category android:name="android.intent.category.DEFAULT"/>\n\
                <data android:mimeType="application/zip"/>\n\
            </intent-filter>' $MANIFEST
          fi

      - name: Gerar Ícones Android
        run: |
          mkdir -p resources
          if [ -f "ícone.png" ]; then
            cp ícone.png resources/icon-only.png
            cp ícone.png resources/icon-foreground.png
            cp ícone.png resources/icon-background.png
            npx capacitor-assets generate --android || true
          fi

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '17'

      - name: Sincronizar Capacitor
        run: npx cap sync android

      - name: Configurar Keystore
        run: |
          echo $KEYSTORE_BASE64 | base64 --decode > android/keystore.jks

      - name: Compilar Release APK e AAB
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean assembleRelease bundleRelease \
            -Pandroid.injected.signing.store.file=keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload APK e AAB
        uses: actions/upload-artifact@v4
        with:
          name: WhatsView-Release
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/bundle/release/app-release.aab

      - name: Criar Release Automático
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
