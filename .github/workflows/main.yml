name: Gerar APK Final
on:
  push:
    branches: [ main ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Instalar Ferramentas
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          npx cap init WhatsView com.whatsview.app --web-dir .
          npx cap add android

      - name: Gerar Ícones
        run: |
          mkdir -p resources
          cp icon.png resources/icon-only.png
          cp icon.png resources/icon-foreground.png
          cp icon.png resources/icon-background.png
          npx capacitor-assets generate --android

      - name: Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build do APK
        run: |
          npx cap copy
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: WhatsView-APK-Pronto
          path: android/app/build/outputs/apk/debug/app-debug.apk
