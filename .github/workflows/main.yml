name: Gerar APK Final

on:
push:
branches: [ main ]

jobs:
android-build:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout Código
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Preparar Pastas e Instalar Ferramentas
    run: |
      mkdir -p www
      cp index.html www/
      cp manifest.json www/ || true
      cp sw.js www/ || true
      cp ícone.png www/ || true

      npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets

      npx cap init WhatsView com.whatsview.app --web-dir www
      npx cap add android || echo "Android já existe"

  - name: Ativar Compartilhamento de ZIP (WhatsApp)
    run: |
      MANIFEST="android/app/src/main/AndroidManifest.xml"

      if [ -f "$MANIFEST" ]; then
        sed -i '/<\/activity>/i \
        <intent-filter>\n\
            <action android:name="android.intent.action.SEND"/>\n\
            <category android:name="android.intent.category.DEFAULT"/>\n\
            <data android:mimeType="application/zip"/>\n\
        </intent-filter>\n\
        <intent-filter>\n\
            <action android:name="android.intent.action.SEND_MULTIPLE"/>\n\
            <category android:name="android.intent.category.DEFAULT"/>\n\
            <data android:mimeType="application/zip"/>\n\
        </intent-filter>' $MANIFEST
      fi

  - name: Gerar Ícones Android
    run: |
      mkdir -p resources
      if [ -f "ícone.png" ]; then
        cp ícone.png resources/icon-only.png
        cp ícone.png resources/icon-foreground.png
        cp ícone.png resources/icon-background.png
        npx capacitor-assets generate --android || true
      fi

  - name: Setup Java JDK 17
    uses: actions/setup-java@v4
    with:
      distribution: zulu
      java-version: '17'

  - name: Sincronizar Capacitor
    run: npx cap sync android

  - name: Compilar APK
    run: |
      cd android
      chmod +x gradlew
      ./gradlew assembleDebug

  - name: Enviar APK
    uses: actions/upload-artifact@v4
    with:
      name: WhatsView-APK
      path: android/app/build/outputs/apk/debug/app-debug.apk
```
