name: Gerar APK Final
on:
  push:
    branches: [ main ]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar Ferramentas
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android @capacitor/assets
          # Removido o --force que causou o erro
          npx cap init WhatsView com.whatsview.app --web-dir .
          npx cap add android || echo "Pasta Android já existe"

      - name: Gerar Ícones
        run: |
          mkdir -p resources
          if [ -f "icon.png" ]; then
            cp icon.png resources/icon-only.png
            cp icon.png resources/icon-foreground.png
            cp icon.png resources/icon-background.png
            npx capacitor-assets generate --android || true
          fi

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sincronizar e Compilar
        run: |
          npx cap sync android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Enviar APK Pronto
        uses: actions/upload-artifact@v4
        with:
          name: WhatsView-Instalador
          path: android/app/build/outputs/apk/debug/app-debug.apk
