<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WhatsView</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f7;
height:100vh;
display:flex;
flex-direction:column;
}

header{
height:55px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
background:white;
border-bottom:1px solid #eee;
font-weight:bold;
}

#tabs{
display:flex;
background:white;
border-bottom:1px solid #eee;
}

.tab{
flex:1;
text-align:center;
padding:10px;
cursor:pointer;
}

.tab.active{
color:#007aff;
border-bottom:2px solid #007aff;
}

#chat-list{
flex:1;
overflow:auto;
}

.chat{
padding:12px;
border-bottom:1px solid #eee;
background:white;
cursor:pointer;
}

#chat-view{
position:fixed;
inset:0;
background:#e5ddd5;
display:none;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.bubble{
background:white;
padding:8px 12px;
border-radius:10px;
margin-bottom:8px;
max-width:75%;
font-size:14px;
}

.media img,
.media video,
.media audio{
max-width:100%;
border-radius:8px;
margin-top:5px;
}

#galeria{
display:none;
flex:1;
overflow:auto;
padding:6px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:6px;
}

.grid img,
.grid video{
width:100%;
height:120px;
object-fit:cover;
border-radius:8px;
cursor:pointer;
}

.viewer{
position:fixed;
inset:0;
background:black;
display:none;
align-items:center;
justify-content:center;
}

.viewer img,
.viewer video{
max-width:100%;
max-height:100%;
}

.fab{
position:fixed;
bottom:20px;
right:20px;
width:55px;
height:55px;
border:none;
border-radius:50%;
background:#25d366;
color:white;
font-size:26px;
cursor:pointer;
}

</style>
</head>

<body>

<header>
<div onclick="limpar()">Limpar</div>
<div>WhatsView</div>
<div onclick="exportar()">Exportar</div>
</header>

<div id="tabs">
<div class="tab active" onclick="tab('chats')">Chats</div>
<div class="tab" onclick="tab('galeria')">Galeria</div>
</div>

<div id="chat-list"></div>

<div id="galeria">
<div class="grid" id="grid"></div>
</div>

<button class="fab" onclick="files.click()">+</button>

<div id="chat-view">

<header>
<div onclick="fechar()">❮</div>
<div id="chat-title"></div>
</header>

<div id="messages"></div>

</div>

<div class="viewer" id="viewer" onclick="viewer.style.display='none'">
<img id="vimg">
<video id="vvid" controls></video>
</div>

<input type="file" id="files" multiple hidden>

<script>

let db=[]
let chatAtual="Backup WhatsApp"

async function init(){

let d=await localforage.getItem("db")

if(d) db=d

renderChats()

}

init()

/* TABS */

function tab(t){

document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"))

if(t==="chats"){

document.querySelectorAll(".tab")[0].classList.add("active")
document.getElementById("chat-list").style.display="block"
document.getElementById("galeria").style.display="none"

}else{

document.querySelectorAll(".tab")[1].classList.add("active")
document.getElementById("chat-list").style.display="none"
document.getElementById("galeria").style.display="block"

renderGaleria()

}

}

/* CHAT LIST */

function renderChats(){

let list=document.getElementById("chat-list")

list.innerHTML=""

let chats=[...new Set(db.map(x=>x.grupo))]

chats.forEach(c=>{

let d=document.createElement("div")

d.className="chat"
d.innerText=c

d.onclick=()=>abrirChat(c)

list.appendChild(d)

})

}

/* CHAT */

function abrirChat(nome){

chatAtual=nome

document.getElementById("chat-title").innerText=nome
document.getElementById("chat-view").style.display="flex"

renderChat()

}

function fechar(){

document.getElementById("chat-view").style.display="none"

}

async function renderChat(){

let area=document.getElementById("messages")

area.innerHTML=""

let msgs=db.filter(m=>m.grupo===chatAtual).slice(-200)

for(let m of msgs){

let div=document.createElement("div")

div.className="bubble"

let media=""

if(m.mKey){

let blob=await localforage.getItem("media_"+m.mKey)

if(blob){

let url=URL.createObjectURL(blob)

if(m.mKey.match(/jpg|png|jpeg|webp|gif/i))
media=`<div class="media"><img src="${url}" onclick="verImg('${url}')"></div>`

if(m.mKey.match(/mp4|webm|mov/i))
media=`<div class="media"><video src="${url}" controls></video>`

if(m.mKey.match(/mp3|opus|ogg|m4a/i))
media=`<div class="media"><audio src="${url}" controls></audio>`

}

}

div.innerHTML=`<b>${m.sender}</b><div>${media}${m.msg}</div>`

area.appendChild(div)

}

area.scrollTop=area.scrollHeight

}

/* GALERIA */

async function renderGaleria(){

let grid=document.getElementById("grid")

grid.innerHTML=""

let midia=db.filter(x=>x.mKey).slice(-150).reverse()

for(let m of midia){

let blob=await localforage.getItem("media_"+m.mKey)

if(!blob) continue

let url=URL.createObjectURL(blob)

let el=document.createElement("div")

if(m.mKey.match(/jpg|png|jpeg|webp|gif/i)){

el.innerHTML=`<img src="${url}">`
el.onclick=()=>verImg(url)

}

if(m.mKey.match(/mp4|webm|mov/i)){

el.innerHTML=`<video src="${url}"></video>`
el.onclick=()=>verVid(url)

}

grid.appendChild(el)

}

}

/* VIEWER */

function verImg(url){

let img=document.getElementById("vimg")
let vid=document.getElementById("vvid")

img.src=url
img.style.display="block"

vid.style.display="none"

document.getElementById("viewer").style.display="flex"

}

function verVid(url){

let img=document.getElementById("vimg")
let vid=document.getElementById("vvid")

vid.src=url
vid.style.display="block"

img.style.display="none"

document.getElementById("viewer").style.display="flex"

}

/* IMPORT */

document.getElementById("files").addEventListener("change",async e=>{

for(let f of e.target.files){

if(f.name.endsWith(".zip")){

let zip=await JSZip.loadAsync(f)

for(let p in zip.files){

let entry=zip.files[p]

if(entry.dir) continue

if(p.endsWith(".txt")){

let txt=await entry.async("string")
parseTxt(txt)

}else{

let blob=await entry.async("blob")

await localforage.setItem("media_"+p,blob)

db.push({
sender:"Arquivo",
msg:p,
grupo:"Backup WhatsApp",
mKey:p,
ts:Date.now()
})

}

}

}else if(f.name.endsWith(".txt")){

let txt=await f.text()
parseTxt(txt)

}else{

await localforage.setItem("media_"+f.name,f)

db.push({
sender:"Arquivo",
msg:f.name,
grupo:"Backup WhatsApp",
mKey:f.name,
ts:Date.now()
})

}

}

await localforage.setItem("db",db)

renderChats()

})

/* PARSER */

function parseTxt(t){

let linhas=t.split(/\n/)

linhas.forEach(l=>{

let m=l.match(/^(\d+\/\d+\/\d+).*?- (.*?): (.*)$/)

if(!m) return

let msg=m[3]

let media=null

if(msg.match(/\.(jpg|jpeg|png|gif|webp|mp4|mov|webm|mp3|opus|ogg|m4a)/i))
media=msg

db.push({
sender:m[2],
msg:msg,
grupo:"Backup WhatsApp",
mKey:media,
ts:Date.now()
})

})

}

/* LIMPAR */

function limpar(){

if(confirm("Apagar dados?")){

localforage.clear().then(()=>location.reload())

}

}

/* EXPORT */

async function exportar(){

let blob=new Blob([JSON.stringify(db)],{type:"application/json"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="backup.json"

a.click()

}

</script>

</body>
</html>
