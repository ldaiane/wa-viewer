<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WhatsView</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

<style>

:root{
--bg:#f2f2f7;
--card:#ffffff;
--ios-blue:#007aff;
--text:#111;
--bubble-shadow:0 2px 10px rgba(0,0,0,.08);
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Arial;
background:var(--bg);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */

header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
background:rgba(255,255,255,.85);
backdrop-filter:blur(20px);
border-bottom:1px solid #e5e5ea;
font-weight:600;
}

/* TABS */

#tabs{
display:flex;
background:white;
border-bottom:1px solid #eee;
}

.tab{
flex:1;
text-align:center;
padding:12px;
cursor:pointer;
font-weight:600;
}

.tab.active{
color:var(--ios-blue);
border-bottom:2px solid var(--ios-blue);
}

/* CHAT LIST */

#chat-list{
flex:1;
overflow:auto;
}

.chat-row{
display:flex;
align-items:center;
gap:12px;
padding:14px 16px;
border-bottom:1px solid #eee;
background:white;
cursor:pointer;
}

.chat-row:hover{
background:#f7f7f7;
}

.avatar{
width:46px;
height:46px;
border-radius:50%;
background:linear-gradient(135deg,#007aff,#34c759);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
}

/* CHAT VIEW */

#chat{
position:fixed;
inset:0;
background:#e5ddd5;
display:none;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
display:flex;
flex-direction:column;
gap:8px;
padding:12px;
}

.bubble{
max-width:75%;
padding:10px 14px;
border-radius:18px;
box-shadow:var(--bubble-shadow);
font-size:14px;
}

.time{
font-size:10px;
opacity:.6;
margin-top:4px;
text-align:right;
}

.date{
align-self:center;
background:#ddd;
padding:4px 10px;
border-radius:8px;
font-size:12px;
}

/* MEDIA */

.media img,
.media video{
max-width:100%;
border-radius:12px;
margin-top:6px;
}

/* GALERIA */

#galeria{
flex:1;
overflow:auto;
display:none;
padding:6px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:6px;
}

.grid div{
aspect-ratio:1;
overflow:hidden;
border-radius:12px;
background:#ddd;
}

.grid img,
.grid video{
width:100%;
height:100%;
object-fit:cover;
cursor:pointer;
}

/* FULLSCREEN */

.viewer{
position:fixed;
inset:0;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:50;
}

.viewer img,
.viewer video{
max-width:100%;
max-height:100%;
}

/* FLOAT BUTTON */

.fab{
position:fixed;
bottom:20px;
right:20px;
width:58px;
height:58px;
border:none;
border-radius:50%;
background:#25d366;
color:white;
font-size:28px;
box-shadow:0 6px 16px rgba(0,0,0,.25);
cursor:pointer;
}

</style>
</head>

<body>

<header>
<div onclick="limpar()">Limpar</div>
<div>WhatsView</div>
<div onclick="exportar()">Exportar</div>
</header>

<div id="tabs">
<div class="tab active" onclick="abrirTab('chats')">Chats</div>
<div class="tab" onclick="abrirTab('galeria')">Galeria</div>
</div>

<div id="chat-list"></div>

<div id="galeria">
<div class="grid" id="gridMidia"></div>
</div>

<button class="fab" onclick="abrirArquivos()">+</button>

<div id="chat">

<header>
<div onclick="fechar()">❮</div>
<div id="chat-title"></div>
<div onclick="abrirArquivos()">📎</div>
</header>

<div id="messages"></div>

</div>

<div class="viewer" id="viewer" onclick="fecharViewer()">
<img id="viewer-img">
<video id="viewer-video" controls></video>
</div>

<input type="file" id="files" multiple webkitdirectory directory hidden>

<script>

let db=[]
let chat=""
let urlCache={}
let msgIndex=new Set()

localforage.getItem("db").then(d=>{
if(d){
db=d
d.forEach(m=>{
msgIndex.add(m.ts+"_"+m.sender+"_"+m.msg)
})
}
renderChats()
})

function abrirTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

if(tab=="chats"){

document.querySelectorAll(".tab")[0].classList.add("active")
document.getElementById("chat-list").style.display="block"
document.getElementById("galeria").style.display="none"

}else{

document.querySelectorAll(".tab")[1].classList.add("active")
document.getElementById("chat-list").style.display="none"
document.getElementById("galeria").style.display="block"

renderGaleria()

}

}

function renderChats(){

let area=document.getElementById("chat-list")

area.innerHTML=""

let chats=[...new Set(db.map(x=>x.grupo))]

for(let c of chats){

let d=document.createElement("div")

d.className="chat-row"

d.innerHTML=`<div class="avatar">${c[0]}</div><div>${c}</div>`

d.onclick=()=>abrir(c)

area.appendChild(d)

}

}

function abrir(nome){

chat=nome

document.getElementById("chat-title").innerText=nome
document.getElementById("chat").style.display="flex"

renderChat()

}

function fechar(){

document.getElementById("chat").style.display="none"

}

function renderChat(){

let area=document.getElementById("messages")

area.innerHTML=""

let msgs=db.filter(m=>m.grupo==chat)

let ultima=""

msgs.forEach(async m=>{

let data=new Date(m.ts).toLocaleDateString()

if(data!=ultima){

let d=document.createElement("div")
d.className="date"
d.innerText=data

area.appendChild(d)

ultima=data

}

let div=document.createElement("div")

div.className="bubble"

let media=""

if(m.mKey){

let blob=await localforage.getItem("media_"+m.mKey)

if(blob){

let url=URL.createObjectURL(blob)

if(m.mKey.match(/\.(jpg|png|jpeg|webp|gif)/i)){

media=`<div class="media"><img src="${url}" onclick="verImagem('${url}')"></div>`

}

if(m.mKey.match(/\.(mp4|mov|webm)/i)){

media=`<div class="media"><video src="${url}" controls></video></div>`

}

}

}

let hora=new Date(m.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})

div.innerHTML=`<b>${m.sender}</b><div>${media}${m.msg}</div><div class="time">${hora}</div>`

area.appendChild(div)

})

}

function renderGaleria(){

let area=document.getElementById("gridMidia")

area.innerHTML=""

let midias=db.filter(m=>m.mKey)

midias.forEach(async m=>{

let blob=await localforage.getItem("media_"+m.mKey)

if(!blob)return

let url=URL.createObjectURL(blob)

let div=document.createElement("div")

if(m.mKey.match(/\.(jpg|png|jpeg|webp|gif)/i)){

div.innerHTML=`<img src="${url}">`

div.onclick=()=>verImagem(url)

}

if(m.mKey.match(/\.(mp4|mov|webm)/i)){

div.innerHTML=`<video src="${url}"></video>`

div.onclick=()=>verVideo(url)

}

area.appendChild(div)

})

}

function verImagem(url){

document.getElementById("viewer").style.display="flex"
document.getElementById("viewer-img").src=url
document.getElementById("viewer-video").style.display="none"

}

function verVideo(url){

document.getElementById("viewer").style.display="flex"

let v=document.getElementById("viewer-video")

v.src=url
v.style.display="block"

document.getElementById("viewer-img").style.display="none"

}

function fecharViewer(){

document.getElementById("viewer").style.display="none"

}

function abrirArquivos(){

document.getElementById("files").click()

}

document.getElementById("files").addEventListener("change",e=>{
importar(e.target.files)
})

async function importar(files){

for(let file of files){

if(file.name.endsWith(".zip")){

let zip=await JSZip.loadAsync(file)

for(let path in zip.files){

let entry=zip.files[path]

if(entry.dir)continue

if(path.endsWith(".txt")){

let txt=await entry.async("string")

parseTexto(txt)

}else{

let blob=await entry.async("blob")

await salvar(blob,path)

}

}

}else{

await salvar(file,file.name)

}

}

await localforage.setItem("db",db)

renderChats()

}

async function salvar(blob,nome){

let id="media_"+nome

if(await localforage.getItem(id)) return

await localforage.setItem(id,blob)

db.push({
ts:Date.now(),
sender:"Arquivo",
msg:nome,
grupo:chat||"Importado",
mKey:nome
})

}

function parseTexto(t){

let linhas=t.split("\n")

linhas.forEach(l=>{

let m=l.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),?\s(\d{1,2}):(\d{2})\s-\s(.*?):\s([\s\S]*)$/)

if(m){

let ano=m[3].length==2?"20"+m[3]:m[3]

let data=new Date(`${ano}-${m[2]}-${m[1]}T${m[4]}:${m[5]}`)

let id=data.getTime()+"_"+m[6]+"_"+m[7]

if(msgIndex.has(id)) return

msgIndex.add(id)

db.push({
ts:data.getTime(),
sender:m[6],
msg:m[7],
grupo:chat||"Importado",
mKey:m[7]
})

}

})

}

function limpar(){

if(confirm("Apagar tudo?")){
localforage.clear().then(()=>location.reload())
}

}

async function exportar(){

let zip=new JSZip()

zip.file("backup.json",JSON.stringify(db))

let blob=await zip.generateAsync({type:"blob"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="backup.zip"
a.click()

}

</script>

</body>
</html>
