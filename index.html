<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WhatsView</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

<style>

:root{
--bg:#f2f2f7;
--blue:#007aff;
}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial;
background:var(--bg);
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

/* HEADER */

header{
height:56px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
background:white;
border-bottom:1px solid #eee;
font-weight:600;
}

/* TABS */

#tabs{
display:flex;
background:white;
border-bottom:1px solid #eee;
}

.tab{
flex:1;
text-align:center;
padding:12px;
cursor:pointer;
}

.tab.active{
color:var(--blue);
border-bottom:2px solid var(--blue);
}

/* CHAT LIST */

#chat-list{
flex:1;
overflow:auto;
}

.chat-row{
display:flex;
align-items:center;
gap:12px;
padding:14px;
border-bottom:1px solid #eee;
background:white;
cursor:pointer;
}

.avatar{
width:44px;
height:44px;
border-radius:50%;
background:linear-gradient(135deg,#007aff,#34c759);
color:white;
display:flex;
align-items:center;
justify-content:center;
font-weight:600;
}

/* CHAT */

#chat-view{
position:fixed;
inset:0;
background:#e5ddd5;
display:none;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:12px;
display:flex;
flex-direction:column;
gap:8px;
}

.bubble{
background:white;
padding:10px 14px;
border-radius:16px;
max-width:75%;
font-size:14px;
}

.time{
font-size:10px;
opacity:.6;
text-align:right;
margin-top:4px;
}

.date{
align-self:center;
background:#ddd;
padding:4px 10px;
border-radius:8px;
font-size:12px;
}

.media img,
.media video{
max-width:100%;
border-radius:10px;
margin-top:6px;
}

/* GALERIA */

#galeria{
flex:1;
overflow:auto;
display:none;
padding:6px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
gap:6px;
}

.grid div{
aspect-ratio:1;
overflow:hidden;
border-radius:10px;
background:#ddd;
}

.grid img,
.grid video{
width:100%;
height:100%;
object-fit:cover;
}

/* VIEWER */

.viewer{
position:fixed;
inset:0;
background:black;
display:none;
align-items:center;
justify-content:center;
}

.viewer img,
.viewer video{
max-width:100%;
max-height:100%;
}

/* BUTTON */

.fab{
position:fixed;
bottom:20px;
right:20px;
width:56px;
height:56px;
border:none;
border-radius:50%;
background:#25d366;
color:white;
font-size:28px;
cursor:pointer;
}

/* LOADER */

#loader{
position:fixed;
inset:0;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
}

</style>
</head>

<body>

<header>
<div onclick="limpar()">Limpar</div>
<div>WhatsView</div>
<div onclick="exportar()">Exportar</div>
</header>

<div id="tabs">
<div class="tab active" onclick="abrirTab('chats')">Chats</div>
<div class="tab" onclick="abrirTab('galeria')">Galeria</div>
</div>

<div id="chat-list"></div>

<div id="galeria">
<div class="grid" id="gridMidia"></div>
</div>

<button class="fab" onclick="abrirArquivos()">+</button>

<div id="chat-view">

<header>
<div onclick="fecharChat()">❮</div>
<div id="chat-title"></div>
<div onclick="abrirArquivos()">📎</div>
</header>

<div id="messages"></div>

</div>

<div class="viewer" id="viewer" onclick="fecharViewer()">
<img id="viewer-img">
<video id="viewer-video" controls></video>
</div>

<div id="loader">Importando...</div>

<input type="file" id="files" multiple hidden>

<script>

let db=[]
let currentChat=null
let msgIndex=new Set()
let urlCache={}

async function iniciar(){

let d=await localforage.getItem("db")

if(d){
db=d
d.forEach(m=>{
msgIndex.add(m.ts+"_"+m.sender+"_"+m.msg)
})
}

renderChats()

}

iniciar()

/* TABS */

function abrirTab(tab){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

if(tab==="chats"){

document.querySelectorAll(".tab")[0].classList.add("active")
document.getElementById("chat-list").style.display="block"
document.getElementById("galeria").style.display="none"

}else{

document.querySelectorAll(".tab")[1].classList.add("active")
document.getElementById("chat-list").style.display="none"
document.getElementById("galeria").style.display="block"

renderGaleria()

}

}

/* CHAT LIST */

function renderChats(){

let area=document.getElementById("chat-list")
area.innerHTML=""

let chats=[...new Set(db.map(x=>x.grupo))]

chats.forEach(c=>{

let row=document.createElement("div")
row.className="chat-row"

row.innerHTML=`
<div class="avatar">${c.substring(0,2).toUpperCase()}</div>
<div>${c}</div>
`

row.onclick=()=>abrirChat(c)

area.appendChild(row)

})

}

/* OPEN CHAT */

function abrirChat(nome){

currentChat=nome

document.getElementById("chat-title").innerText=nome
document.getElementById("chat-view").style.display="flex"

renderChat()

}

function fecharChat(){
document.getElementById("chat-view").style.display="none"
}

/* RENDER CHAT */

async function renderChat(){

let area=document.getElementById("messages")
area.innerHTML=""

let msgs=db.filter(m=>m.grupo===currentChat)

let ultima=""

for(let m of msgs.slice(-300)){

let data=new Date(m.ts).toLocaleDateString()

if(data!==ultima){

let d=document.createElement("div")
d.className="date"
d.innerText=data

area.appendChild(d)

ultima=data

}

let div=document.createElement("div")
div.className="bubble"

let media=""

if(m.mKey){

let blob=await localforage.getItem("media_"+m.mKey)

if(blob){

if(!urlCache[m.mKey]){
urlCache[m.mKey]=URL.createObjectURL(blob)
}

let url=urlCache[m.mKey]

if(m.mKey.match(/\.(jpg|jpeg|png|gif|webp)/i))
media=`<div class="media"><img src="${url}" onclick="verImagem('${url}')"></div>`

if(m.mKey.match(/\.(mp4|webm|mov)/i))
media=`<div class="media"><video src="${url}" controls></video>`

}

}

let hora=new Date(m.ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})

div.innerHTML=`<b>${m.sender}</b><div>${media}${m.msg}</div><div class="time">${hora}</div>`

area.appendChild(div)

}

area.scrollTop=area.scrollHeight

}

/* GALERIA */

async function renderGaleria(){

let area=document.getElementById("gridMidia")
area.innerHTML=""

let midias=db.filter(m=>m.mKey).slice(-200).reverse()

for(let m of midias){

let blob=await localforage.getItem("media_"+m.mKey)
if(!blob)continue

if(!urlCache[m.mKey])
urlCache[m.mKey]=URL.createObjectURL(blob)

let url=urlCache[m.mKey]

let div=document.createElement("div")

if(m.mKey.match(/\.(jpg|jpeg|png|gif|webp)/i)){
div.innerHTML=`<img src="${url}">`
div.onclick=()=>verImagem(url)
}

if(m.mKey.match(/\.(mp4|webm|mov)/i)){
div.innerHTML=`<video src="${url}"></video>`
div.onclick=()=>verVideo(url)
}

area.appendChild(div)

}

}

/* VIEWER */

function verImagem(url){

let img=document.getElementById("viewer-img")
let vid=document.getElementById("viewer-video")

vid.pause()
vid.style.display="none"

img.src=url
img.style.display="block"

document.getElementById("viewer").style.display="flex"

}

function verVideo(url){

let img=document.getElementById("viewer-img")
let vid=document.getElementById("viewer-video")

img.style.display="none"

vid.src=url
vid.style.display="block"
vid.play()

document.getElementById("viewer").style.display="flex"

}

function fecharViewer(){

document.getElementById("viewer").style.display="none"

}

/* IMPORT */

function abrirArquivos(){
document.getElementById("files").click()
}

document.getElementById("files").addEventListener("change",e=>{
importar(e.target.files)
})

async function importar(files){

document.getElementById("loader").style.display="flex"

for(let file of files){

if(file.name.endsWith(".txt")){

let txt=await file.text()
parseTexto(txt)

}else{

await salvar(file,file.name)

}

}

await localforage.setItem("db",db)

document.getElementById("loader").style.display="none"

renderChats()

}

/* SAVE MEDIA */

async function salvar(blob,nome){

let id="media_"+nome

if(await localforage.getItem(id)) return

await localforage.setItem(id,blob)

db.push({
ts:Date.now(),
sender:"Arquivo",
msg:nome,
grupo:"Importado",
mKey:nome
})

}

/* PARSER */

function parseTexto(t){

let linhas=t.split(/\r?\n/)

linhas.forEach(l=>{

let m=l.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),?\s(\d{1,2}):(\d{2})\s-\s(.*?):\s([\s\S]*)$/)

if(!m) return

let ano=m[3].length==2?"20"+m[3]:m[3]

let data=new Date(`${ano}-${m[2]}-${m[1]}T${m[4]}:${m[5]}`)

let id=data.getTime()+"_"+m[6]+"_"+m[7]

if(msgIndex.has(id)) return

msgIndex.add(id)

db.push({
ts:data.getTime(),
sender:m[6],
msg:m[7],
grupo:"Importado"
})

})

}

/* CLEAR */

function limpar(){

if(confirm("Apagar tudo?")){

localforage.clear().then(()=>location.reload())

}

}

/* EXPORT */

async function exportar(){

let zip=new JSZip()

zip.file("backup.json",JSON.stringify(db))

let blob=await zip.generateAsync({type:"blob"})

let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="backup.zip"
a.click()

}

</script>

</body>
</html>
