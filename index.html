<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#007aff">
    <link rel="manifest" href="manifest.json">
    <title>WhatsView GitHub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>
    <style>
        :root { --ios-blue: #007aff; --ios-bg: #f2f2f7; }
        html, body { position: fixed; width: 100%; height: 100%; overflow: hidden; margin: 0; font-family: -apple-system, system-ui, sans-serif; background: #fff; }
        header { height: 50px; background: #f9f9f9; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; border-bottom: 0.5px solid #ccc; z-index: 100; }
        #home-view { height: calc(100% - 50px); overflow-y: auto; -webkit-overflow-scrolling: touch; background: #fff; }
        .chat-list-item { padding: 15px; display: flex; align-items: center; gap: 12px; border-bottom: 0.5px solid #eee; cursor: pointer; }
        #chat-view { display: none; position: fixed; inset: 0; background: var(--ios-bg); flex-direction: column; z-index: 200; }
        .content-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px; display: flex; flex-direction: column; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 18px; margin-bottom: 10px; font-size: 14px; position: relative; line-height: 1.4; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .mine { background: var(--ios-blue); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        .theirs { background: #fff; color: #000; align-self: flex-start; border-bottom-left-radius: 4px; }
        .origin-tag { font-size: 9px; font-weight: 800; display: block; margin-bottom: 4px; opacity: 0.7; text-transform: uppercase; }
        .mine .origin-tag { color: rgba(255,255,255,0.9); }
        .theirs .origin-tag { color: var(--ios-blue); }
        .meta { font-size: 9px; opacity: 0.5; text-align: right; margin-top: 5px; }
        .fab { position: fixed; bottom: 30px; right: 20px; width: 60px; height: 60px; background: var(--ios-blue); color: white; border-radius: 50%; border: none; font-size: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 300; }
        .chat-media img { max-width: 100%; border-radius: 10px; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <div style="color:var(--ios-blue); font-size:14px;" onclick="resetApp()">Limpar</div>
    <div style="font-weight:bold;">WhatsView</div>
    <div id="installBtn" style="display:none; color:var(--ios-blue); font-weight:bold; font-size:12px;">INSTALAR</div>
</header>

<div id="home-view"></div>

<div id="chat-view">
    <header>
        <div style="color:var(--ios-blue);" onclick="closeChat()">❮ Voltar</div>
        <div id="chat-title" style="font-weight:bold;"></div>
        <div style="width:40px;"></div>
    </header>
    <div id="msg-container" class="content-area"></div>
</div>

<button class="fab" onclick="document.getElementById('fileInput').click()">+</button>
<input type="file" id="fileInput" multiple accept=".zip,.txt" style="display:none" onchange="handleFiles(this.files)">

<script>
    // PWA Service Worker
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

    let db = [];
    const mediaMap = new Map();

    async function handleFiles(files) {
        alert("Processando... Aguarde.");
        for (let file of files) {
            if (file.name.endsWith('.zip')) {
                const zip = await JSZip.loadAsync(file);
                for (let filename in zip.files) {
                    const entry = zip.files[filename];
                    if (filename.endsWith('.txt')) {
                        const text = await entry.async("string");
                        parseText(text, filename);
                    } else if (!entry.dir) {
                        const blob = await entry.async("blob");
                        mediaMap.set(filename, URL.createObjectURL(blob));
                    }
                }
            } else if (file.name.endsWith('.txt')) {
                const text = await file.text();
                parseText(text, file.name);
            }
        }
        await localforage.setItem('wv_store', db);
        renderHome();
        alert("Concluído!");
    }

    function parseText(content, origin) {
        const lines = content.split('\n');
        const source = origin.replace('.txt', '');
        lines.forEach(line => {
            const m = line.match(/^(\d{2}\/\d{2}\/\d{4})[ ,](\d{2}:\d{2}) - (.*?): (.*)$/);
            if (m) {
                const [, date, time, sender, text] = m;
                let mediaUrl = null;
                // Busca simples de mídia
                mediaMap.forEach((url, name) => { if(text.includes(name)) mediaUrl = url; });
                db.push({ date, time, sender, text, source, origin, mediaUrl });
            }
        });
    }

    function renderHome() {
        const home = document.getElementById('home-view');
        home.innerHTML = '';
        const groups = [...new Set(db.map(m => m.source))];
        groups.forEach(g => {
            const div = document.createElement('div');
            div.className = 'chat-list-item';
            div.onclick = () => openChat(g);
            div.innerHTML = `<div style="width:40px; height:40px; background:var(--ios-blue); color:#fff; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">${g[0]}</div>
                             <div style="font-weight:600;">${g}</div>`;
            home.appendChild(div);
        });
    }

    function openChat(s) {
        const container = document.getElementById('msg-container');
        container.innerHTML = '';
        document.getElementById('chat-title').innerText = s;
        db.filter(m => m.source === s).forEach(m => {
            const isMine = m.sender.includes("Você") || m.sender.includes("Me");
            const div = document.createElement('div');
            div.className = `bubble ${isMine ? 'mine' : 'theirs'}`;
            div.innerHTML = `
                <span class="origin-tag">📂 ${m.origin}</span>
                <div style="font-weight:bold; font-size:11px; margin-bottom:2px;">${m.sender}</div>
                ${m.mediaUrl ? `<div class="chat-media"><img src="${m.mediaUrl}"></div>` : ''}
                <div style="word-break:break-word;">${m.text}</div>
                <div class="meta">${m.date} ${m.time}</div>
            `;
            container.appendChild(div);
        });
        document.getElementById('chat-view').style.display = 'flex';
        container.scrollTop = container.scrollHeight;
    }

    function closeChat() { document.getElementById('chat-view').style.display = 'none'; }
    function resetApp() { if(confirm("Apagar tudo?")) { localforage.clear(); location.reload(); } }
    localforage.getItem('wv_store').then(data => { if(data) { db = data; renderHome(); } });

    // Lógica do botão Instalar
    let defPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault(); defPrompt = e;
        document.getElementById('installBtn').style.display = 'block';
    });
    document.getElementById('installBtn').onclick = async () => {
        if(defPrompt) { defPrompt.prompt(); defPrompt = null; }
    };
</script>
</body>
</html>
