<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WhatsView iOS</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

</head>

<body>

<div id="home">

<header class="ios-header">
WhatsView
</header>

<div id="chat-list"></div>

<button class="fab" onclick="novaConversa()">+</button>

</div>

<div id="chat">

<header class="ios-header">

<button onclick="voltar()">‹</button>

<div id="chat-name"></div>

<div class="icons">

<span onclick="mediaTimeline()">🖼</span> <span onclick="abrirArquivos()">➕</span>

</div>

</header>

<input id="search" placeholder="Buscar">

<div id="messages"></div>

<div id="media-view"></div>

</div>

<input type="file" id="files" multiple webkitdirectory hidden>

<script src="app.js"></script>

<script src="player.js"></script>

<script src="lazyload.js"></script>

<script src="media.js"></script>

</body>
</html>
