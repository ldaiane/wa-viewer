<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WhatsView</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
margin:0;
font-family:-apple-system,Arial;
background:#f2f2f7;
height:100vh;
display:flex;
flex-direction:column;
}

header{
height:55px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
background:#fff;
border-bottom:1px solid #eee;
font-weight:600;
}

#chatList{
flex:1;
overflow:auto;
}

.chat{
padding:14px;
border-bottom:1px solid #eee;
background:white;
cursor:pointer;
}

#chat{
display:none;
flex-direction:column;
height:100%;
}

#msgs{
flex:1;
overflow:auto;
padding:10px;
background:#e5ddd5;
}

.msg{
background:white;
padding:8px 12px;
border-radius:10px;
margin-bottom:10px;
max-width:80%;
font-size:14px;
}

.time{
font-size:11px;
color:#777;
margin-top:4px;
text-align:right;
}

.media img,
.media video{
max-width:100%;
border-radius:8px;
margin-top:5px;
}

audio{
width:200px;
margin-top:6px;
}

.fab{
position:fixed;
bottom:20px;
right:20px;
width:56px;
height:56px;
border:none;
border-radius:50%;
background:#25d366;
color:white;
font-size:28px;
cursor:pointer;
}

#galeria{
display:none;
padding:6px;
overflow:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
gap:6px;
}

.grid img,
.grid video{
width:100%;
height:110px;
object-fit:cover;
border-radius:6px;
}

</style>

</head>

<body>

<header>

<div onclick="showChats()">Chats</div>
<div>WhatsView</div>
<div onclick="showGallery()">Galeria</div>

</header>

<div id="chatList"></div>

<div id="chat">

<header>

<div onclick="closeChat()">◀</div>
<div id="chatTitle"></div>
<div></div>

</header>

<div id="msgs"></div>

</div>

<div id="galeria">
<div class="grid" id="grid"></div>
</div>

<button class="fab" onclick="fileInput.click()">+</button>

<input type="file" id="fileInput" multiple hidden>

<script>

let db=[]
let mediaFiles={}
let currentChat="Backup WhatsApp"

/* INIT */

function init(){

let saved=localStorage.getItem("db")

if(saved) db=JSON.parse(saved)

renderChats()

}

init()

/* FORMATAR DATA */

function formatTime(ts){

let d=new Date(ts)

let dia=d.getDate().toString().padStart(2,"0")
let mes=(d.getMonth()+1).toString().padStart(2,"0")
let ano=d.getFullYear()

let h=d.getHours().toString().padStart(2,"0")
let m=d.getMinutes().toString().padStart(2,"0")

return `${dia}/${mes}/${ano} ${h}:${m}`

}

/* CHAT LIST */

function renderChats(){

chatList.innerHTML=""

let chats=[...new Set(db.map(x=>x.chat))]

chats.forEach(c=>{

let d=document.createElement("div")

d.className="chat"
d.innerText=c

d.onclick=()=>openChat(c)

chatList.appendChild(d)

})

}

/* ABRIR CHAT */

function openChat(nome){

currentChat=nome

chatList.style.display="none"
galeria.style.display="none"

chat.style.display="flex"

chatTitle.innerText=nome

renderChat()

}

function closeChat(){

chat.style.display="none"
chatList.style.display="block"

}

/* RENDER CHAT */

function renderChat(){

msgs.innerHTML=""

let mensagens=db
.filter(x=>x.chat===currentChat)
.sort((a,b)=>a.ts-b.ts)
.slice(-150)

mensagens.forEach(m=>{

let div=document.createElement("div")
div.className="msg"

let media=""

if(m.file){

let url=mediaFiles[m.file]

if(url){

if(m.file.match(/jpg|jpeg|png|gif|webp/i))
media=`<div class="media"><img src="${url}"></div>`

else if(m.file.match(/mp4|webm|mov/i))
media=`<div class="media"><video src="${url}" controls></video>`

else if(m.file.match(/mp3|ogg|opus|m4a/i))
media=`<audio src="${url}" controls></audio>`

}

}

div.innerHTML=`
<b>${m.sender}</b><br>
${m.text}
${media}
<div class="time">${formatTime(m.ts)}</div>
`

msgs.appendChild(div)

})

msgs.scrollTop=msgs.scrollHeight

}

/* GALERIA */

function showGallery(){

chatList.style.display="none"
chat.style.display="none"
galeria.style.display="block"

grid.innerHTML=""

Object.keys(mediaFiles).forEach(k=>{

if(!k.match(/jpg|png|jpeg|gif|webp|mp4|webm|mov/i)) return

let url=mediaFiles[k]

let el=document.createElement("div")

if(k.match(/mp4|webm|mov/))
el.innerHTML=`<video src="${url}"></video>`
else
el.innerHTML=`<img src="${url}">`

grid.appendChild(el)

})

}

function showChats(){

galeria.style.display="none"
chat.style.display="none"
chatList.style.display="block"

}

/* IMPORTAR */

fileInput.addEventListener("change",async e=>{

for(let file of e.target.files){

if(file.name.endsWith(".zip")){

let zip=await JSZip.loadAsync(file)

for(let name in zip.files){

let entry=zip.files[name]

if(entry.dir) continue

let blob=await entry.async("blob")

let url=URL.createObjectURL(blob)

mediaFiles[name]=url

if(name.match(/\.(jpg|png|jpeg|gif|webp|mp4|mov|webm|mp3|ogg|opus|m4a)/i)){

db.push({
chat:"Backup WhatsApp",
sender:"Arquivo",
text:name,
file:name,
ts:9999999999999
})

}

}

}

else if(file.name.endsWith(".txt")){

let txt=await file.text()

parseTxt(txt)

}

else{

let url=URL.createObjectURL(file)

mediaFiles[file.name]=url

db.push({
chat:"Backup WhatsApp",
sender:"Arquivo",
text:file.name,
file:file.name,
ts:Date.now()
})

}

}

db.sort((a,b)=>a.ts-b.ts)

localStorage.setItem("db",JSON.stringify(db))

renderChats()

})

/* PARSE TXT */

function parseTxt(t){

let linhas=t.split("\n")

linhas.forEach(l=>{

let m=l.match(/^(\d{1,2}\/\d{1,2}\/\d{2,4}),?\s?(\d{1,2}:\d{2}).*?- (.*?): (.*)$/)

if(!m) return

let d=m[1].split("/")

let dia=d[0]
let mes=d[1]
let ano=d[2].length==2?"20"+d[2]:d[2]

let hora=m[2].split(":")

let ts=new Date(ano,mes-1,dia,hora[0],hora[1]).getTime()

db.push({
chat:"Backup WhatsApp",
sender:m[3],
text:m[4],
ts:ts
})

})

}

renderChats()

</script>

</body>
</html>
