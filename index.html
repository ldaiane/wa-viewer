<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WhatsView</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<style>

body{
margin:0;
font-family:-apple-system,Arial;
background:#f2f2f7;
display:flex;
flex-direction:column;
height:100vh;
}

header{
height:55px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
background:#fff;
border-bottom:1px solid #eee;
font-weight:600;
}

#chatList{
flex:1;
overflow:auto;
}

.chat{
padding:14px;
border-bottom:1px solid #eee;
background:white;
cursor:pointer;
}

#chat{
display:none;
flex-direction:column;
height:100%;
}

#msgs{
flex:1;
overflow:auto;
padding:10px;
background:#e5ddd5;
}

.msg{
background:white;
padding:8px 12px;
border-radius:10px;
margin-bottom:8px;
max-width:80%;
font-size:14px;
}

.media img,
.media video{
max-width:100%;
border-radius:8px;
margin-top:5px;
}

audio{
width:200px;
margin-top:6px;
}

.fab{
position:fixed;
bottom:20px;
right:20px;
width:56px;
height:56px;
border:none;
border-radius:50%;
background:#25d366;
color:white;
font-size:28px;
cursor:pointer;
}

#galeria{
display:none;
padding:6px;
overflow:auto;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(110px,1fr));
gap:6px;
}

.grid img,
.grid video{
width:100%;
height:110px;
object-fit:cover;
border-radius:6px;
}

</style>

</head>

<body>

<header>

<div onclick="showChats()">Chats</div>
<div>WhatsView</div>
<div onclick="showGallery()">Galeria</div>

</header>

<div id="chatList"></div>

<div id="chat">

<header>

<div onclick="closeChat()">◀</div>
<div id="chatTitle"></div>
<div></div>

</header>

<div id="msgs"></div>

</div>

<div id="galeria">
<div class="grid" id="grid"></div>
</div>

<button class="fab" onclick="fileInput.click()">+</button>

<input type="file" id="fileInput" multiple hidden>

<script>

let db=[]
let mediaFiles={}
let currentChat="Backup WhatsApp"

/* INIT */

function init(){

let saved=localStorage.getItem("db")

if(saved) db=JSON.parse(saved)

renderChats()

}

init()

/* CHAT LIST */

function renderChats(){

chatList.innerHTML=""

let chats=[...new Set(db.map(x=>x.chat))]

chats.forEach(c=>{

let d=document.createElement("div")
d.className="chat"
d.innerText=c

d.onclick=()=>openChat(c)

chatList.appendChild(d)

})

}

/* OPEN CHAT */

function openChat(nome){

currentChat=nome

chatList.style.display="none"
galeria.style.display="none"

chat.style.display="flex"

chatTitle.innerText=nome

renderChat()

}

function closeChat(){

chat.style.display="none"
chatList.style.display="block"

}

/* RENDER CHAT */

function renderChat(){

msgs.innerHTML=""

let mensagens=db.filter(x=>x.chat===currentChat).slice(-150)

mensagens.forEach(m=>{

let div=document.createElement("div")
div.className="msg"

let media=""

if(m.file){

let url=mediaFiles[m.file]

if(url){

if(m.file.match(/jpg|jpeg|png|gif|webp/i))
media=`<div class="media"><img src="${url}"></div>`

else if(m.file.match(/mp4|webm|mov/i))
media=`<div class="media"><video src="${url}" controls></video>`

else if(m.file.match(/mp3|ogg|opus|m4a/i))
media=`<audio src="${url}" controls></audio>`

}

}

div.innerHTML="<b>"+m.sender+"</b><br>"+m.text+media

msgs.appendChild(div)

})

msgs.scrollTop=msgs.scrollHeight

}

/* GALERIA */

function showGallery(){

chatList.style.display="none"
chat.style.display="none"
galeria.style.display="block"

grid.innerHTML=""

Object.keys(mediaFiles).forEach(k=>{

if(!k.match(/jpg|png|jpeg|gif|webp|mp4|webm|mov/i)) return

let url=mediaFiles[k]

let el=document.createElement("div")

if(k.match(/mp4|webm|mov/))
el.innerHTML="<video src='"+url+"'></video>"
else
el.innerHTML="<img src='"+url+"'>"

grid.appendChild(el)

})

}

function showChats(){

galeria.style.display="none"
chat.style.display="none"
chatList.style.display="block"

}

/* IMPORT FILES */

fileInput.addEventListener("change",async e=>{

for(let f of e.target.files){

if(f.name.endsWith(".zip")){

let zip=await JSZip.loadAsync(f)

for(let name in zip.files){

let entry=zip.files[name]

if(entry.dir) continue

let blob=await entry.async("blob")

let url=URL.createObjectURL(blob)

mediaFiles[name]=url

if(name.match(/\.(jpg|png|jpeg|gif|webp|mp4|mov|webm|mp3|ogg|opus|m4a)/i)){

db.push({
chat:"Backup WhatsApp",
sender:"Arquivo",
text:name,
file:name
})

}

}

}

else if(f.name.endsWith(".txt")){

let txt=await f.text()

parseTxt(txt)

}

else{

let url=URL.createObjectURL(f)

mediaFiles[f.name]=url

db.push({
chat:"Backup WhatsApp",
sender:"Arquivo",
text:f.name,
file:f.name
})

}

}

localStorage.setItem("db",JSON.stringify(db))

renderChats()

})

/* PARSE TXT */

function parseTxt(t){

let linhas=t.split("\n")

linhas.forEach(l=>{

let m=l.match(/^(\d+\/\d+\/\d+).*?- (.*?): (.*)$/)

if(!m) return

db.push({
chat:"Backup WhatsApp",
sender:m[2],
text:m[3]
})

})

}

/* START */

renderChats()

</script>

</body>
</html>
