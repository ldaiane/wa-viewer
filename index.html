<!DOCTYPE html>

<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>WhatsView Pro+</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js"></script>

<style>

:root{
--blue:#007aff;
--bg:#f2f2f7;
}

body{
margin:0;
font-family:-apple-system,Arial;
height:100vh;
display:flex;
flex-direction:column;
overflow:hidden;
}

header{
height:60px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 16px;
border-bottom:1px solid #ccc;
background:white;
}

#home-view{
flex:1;
overflow:auto;
}

.chat-item{
display:flex;
gap:10px;
padding:16px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.avatar{
width:45px;
height:45px;
border-radius:50%;
background:var(--blue);
color:white;
display:flex;
align-items:center;
justify-content:center;
}

#chat-view{
position:fixed;
inset:0;
background:var(--bg);
display:none;
flex-direction:column;
}

.chat-content{
flex:1;
overflow:auto;
display:flex;
flex-direction:column;
gap:8px;
padding:10px;
}

.bubble{
max-width:80%;
padding:10px;
border-radius:12px;
font-size:14px;
box-shadow:0 1px 2px rgba(0,0,0,.1);
}

.mine{
background:var(--blue);
color:white;
align-self:flex-end;
}

.theirs{
background:white;
align-self:flex-start;
}

.date-divider{
text-align:center;
font-size:12px;
color:#666;
margin:10px 0;
}

.media img,.media video{
max-width:100%;
border-radius:8px;
}

audio{
width:100%;
}

#gallery{
display:none;
grid-template-columns:repeat(3,1fr);
gap:2px;
overflow:auto;
}

.gal{
aspect-ratio:1/1;
background-size:cover;
background-position:center;
}

#search{
width:100%;
padding:8px;
border:none;
border-bottom:1px solid #ccc;
}

.fullscreen{
position:fixed;
inset:0;
background:black;
display:none;
align-items:center;
justify-content:center;
}

.fullscreen img{
max-width:100%;
max-height:100%;
}

</style>

</head>

<body>

<header>
<div onclick="limpar()">LIMPAR</div>
<div>WhatsView Pro+</div>
<div onclick="exportar()">EXPORTAR</div>
</header>

<div id="home-view"></div>

<button onclick="novaConversa()" style="position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;background:#007aff;color:white;font-size:28px;border:none">+</button>

<div id="chat-view">

<header>
<div onclick="fechar()">❮</div>
<div id="chat-title"></div>
<div>
<span onclick="verGaleria()">🖼</span>
<span onclick="abrirArquivos()">➕</span>
</div>
</header>

<input id="search" placeholder="Buscar..." oninput="buscar(this.value)">

<div id="messages" class="chat-content"></div>

<div id="gallery"></div>

</div>

<div class="fullscreen" id="viewer" onclick="fecharViewer()">
<img id="viewer-img">
</div>

<input type="file" id="files" multiple webkitdirectory style="display:none">

<script>

let db=[]
let chat=""
let urlCache={}

localforage.getItem("db").then(d=>{
if(d) db=d
renderHome()
})

function novaConversa(){
let nome=prompt("Nome da conversa")
if(nome) abrir(nome)
}

function abrir(nome){

chat=nome
document.getElementById("chat-title").innerText=nome
document.getElementById("chat-view").style.display="flex"

carregar()

}

function fechar(){
document.getElementById("chat-view").style.display="none"
}

function abrirArquivos(){
document.getElementById("files").click()
}

document.getElementById("files").addEventListener("change",e=>{
importar(e.target.files)
})

async function importar(files){

for(let file of files){

if(file.name.endsWith(".zip")){

await lerZip(file)

}else{

await salvar(file,file.name)

}

}

db.sort((a,b)=>a.ts-b.ts)

await localforage.setItem("db",db)

carregar()
renderHome()

}

async function lerZip(file){

const zip=await JSZip.loadAsync(file)

for(const path in zip.files){

let entry=zip.files[path]

if(entry.dir) continue

if(path.endsWith(".txt")){

let txt=await entry.async("string")
parseTexto(txt)

}else{

let blob=await entry.async("blob")
await salvar(blob,path)

}

}

}

async function salvar(blob,nome){

if(db.find(x=>x.mKey===nome)) return

await localforage.setItem("media_"+nome,blob)

db.push({
ts:Date.now(),
sender:"Arquivo",
msg:"",
grupo:chat,
mKey:nome
})

}

function parseTexto(t){

let linhas=t.split("\n")

for(let l of linhas){

let m=l.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4}),?\s(\d{1,2}):(\d{2})\s-\s(.*?):\s([\s\S]*)$/)

if(m){

let dia=m[1]
let mes=m[2]
let ano=m[3].length==2 ? "20"+m[3] : m[3]

let hora=m[4]
let min=m[5]

let data=new Date(`${ano}-${mes}-${dia}T${hora}:${min}:00`)

db.push({
ts:data.getTime(),
sender:m[6],
msg:m[7],
grupo:chat
})

}

}

}

async function carregar(){

let area=document.getElementById("messages")
let gal=document.getElementById("gallery")

area.innerHTML=""
gal.innerHTML=""

let msgs=db.filter(x=>x.grupo==chat).slice(-2000)

let ultimaData=""

for(let m of msgs){

let data=new Date(m.ts).toLocaleDateString()

if(data!==ultimaData){

let d=document.createElement("div")
d.className="date-divider"
d.innerText=data
area.appendChild(d)

ultimaData=data
}

let div=document.createElement("div")

let mine=m.sender.includes("Você")

div.className="bubble "+(mine?"mine":"theirs")

let media=""

if(m.mKey){

let blob=await localforage.getItem("media_"+m.mKey)

if(blob){

let url

if(!urlCache[m.mKey]){
urlCache[m.mKey]=URL.createObjectURL(blob)
}

url=urlCache[m.mKey]

let l=m.mKey.toLowerCase()

if(l.match(/\.(jpg|jpeg|png|webp|gif)/)){

media=`<div class="media"><img src="${url}" onclick="ver('${url}')"></div>`

let g=document.createElement("div")
g.className="gal"
g.style.backgroundImage=`url(${url})`
gal.appendChild(g)

}

else if(l.match(/\.(mp4|3gp|mov|mkv|webm)/))
media=`<div class="media"><video controls src="${url}"></video></div>`

else if(l.match(/\.(mp3|ogg|m4a|opus|aac|wav)/))
media=`<audio controls preload="metadata" src="${url}"></audio>`

else if(l.endsWith(".pdf"))
media=`<a href="${url}" target="_blank">📄 PDF</a>`

}

}

div.innerHTML=`<b>${m.sender}</b>${media}<div>${m.msg}</div>`

area.appendChild(div)

}

area.scrollTop=area.scrollHeight

}

function renderHome(){

let h=document.getElementById("home-view")

h.innerHTML=""

let grupos=[...new Set(db.map(x=>x.grupo))]

for(let g of grupos){

let d=document.createElement("div")
d.className="chat-item"

let avatar=(g && g.length)?g[0]:"?"

d.innerHTML=`<div class="avatar">${avatar}</div>${g}`

d.onclick=()=>abrir(g)

h.appendChild(d)

}

}

function ver(url){

document.getElementById("viewer").style.display="flex"
document.getElementById("viewer-img").src=url

}

function fecharViewer(){
document.getElementById("viewer").style.display="none"
}

function buscar(t){

let msgs=document.querySelectorAll(".bubble")

msgs.forEach(m=>{
m.style.display=m.innerText.toLowerCase().includes(t.toLowerCase())?"block":"none"
})

}

function verGaleria(){

let g=document.getElementById("gallery")

g.style.display=g.style.display=="grid"?"none":"grid"

}

async function exportar(){

let zip=new JSZip()

let msgs=db.filter(x=>x.grupo==chat)

zip.file("mensagens.json",JSON.stringify(msgs))

for(let m of msgs){

if(m.mKey){

let blob=await localforage.getItem("media_"+m.mKey)

if(blob) zip.file(m.mKey,blob)

}

}

let blob=await zip.generateAsync({type:"blob"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)
a.download="conversa.zip"
a.click()

}

function limpar(){

if(confirm("Apagar tudo?")){
localforage.clear().then(()=>location.reload())
}

}

document.body.addEventListener("dragover",e=>{
e.preventDefault()
})

document.body.addEventListener("drop",e=>{
e.preventDefault()
importar(e.dataTransfer.files)
})

</script>

</body>
</html>
